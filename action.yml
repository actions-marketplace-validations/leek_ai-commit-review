name: 'AI Commit Review'
description: 'Review a single commit with Claude, GPT, and Gemini. Files findings as a GitHub Issue and optionally opens a draft fix PR.'
author: 'leek'
branding:
  icon: 'git-commit'
  color: 'purple'

inputs:
  commit-sha:
    description: 'Commit SHA to review. Caller must have run actions/checkout with fetch-depth: 0.'
    required: true

  anthropic-api-key:
    description: 'Anthropic API key. Provider runs only when set.'
    required: false
    default: ''
  openai-api-key:
    description: 'OpenAI API key. Provider runs only when set.'
    required: false
    default: ''
  gemini-api-key:
    description: 'Gemini API key. Provider runs only when set.'
    required: false
    default: ''

  claude-auth:
    description: 'Claude provider auth mode: auto, api, or cli. auto uses claude-code-oauth-token when set, otherwise anthropic-api-key.'
    required: false
    default: 'auto'
  openai-auth:
    description: 'OpenAI provider auth mode: auto, api, or cli. auto uses Codex CLI auth when codex-access-token or codex-auth-json is set, otherwise openai-api-key.'
    required: false
    default: 'auto'
  claude-code-oauth-token:
    description: 'Claude Code OAuth token from `claude setup-token`. Enables Claude CLI mode in auto auth.'
    required: false
    default: ''
  codex-access-token:
    description: 'Codex access token for CODEX_ACCESS_TOKEN. Enables Codex CLI mode in auto auth.'
    required: false
    default: ''
  codex-auth-json:
    description: 'Optional contents of a Codex auth.json file for Codex CLI mode. Use only on trusted private runners.'
    required: false
    default: ''
  codex-home:
    description: 'Optional CODEX_HOME path for Codex CLI mode. Useful for self-hosted runners with persistent Codex auth.'
    required: false
    default: ''
  install-cli-tools:
    description: 'Install missing Claude Code or Codex CLI tools when a CLI mode is selected.'
    required: false
    default: 'true'
  claude-cli-path:
    description: 'Claude Code CLI command path used in Claude CLI mode.'
    required: false
    default: 'claude'
  codex-cli-path:
    description: 'Codex CLI command path used in OpenAI CLI mode.'
    required: false
    default: 'codex'
  codex-sandbox:
    description: 'Codex sandbox mode used in OpenAI CLI mode. GitHub-hosted runners may require danger-full-access because Codex read-only sandboxing depends on Linux user namespaces.'
    required: false
    default: 'danger-full-access'

  claude-model:
    description: 'Anthropic model id.'
    required: false
    default: 'claude-opus-4-8'
  openai-model:
    description: 'OpenAI model id.'
    required: false
    default: 'gpt-5.5'
  gemini-model:
    description: 'Gemini model id.'
    required: false
    default: 'gemini-3.5-flash'

  claude-context-file:
    description: 'Project context file injected into the Claude prompt. Empty disables.'
    required: false
    default: ''
  openai-context-file:
    description: 'Project context file injected into the OpenAI prompt. Empty disables.'
    required: false
    default: ''
  gemini-context-file:
    description: 'Project context file injected into the Gemini prompt. Empty disables.'
    required: false
    default: ''

  prompt-file:
    description: 'Path to a custom prompt template, relative to the workspace. Overrides the bundled generic prompt. Useful for project-specific reviewer rules.'
    required: false
    default: ''

  exclude-paths:
    description: 'Newline-separated git pathspecs excluded from the diff. Each line passed verbatim to git diff. Use the :!path syntax.'
    required: false
    default: ''

  max-diff-lines:
    description: 'Skip review if filtered diff exceeds this many added/changed lines.'
    required: false
    default: '5000'

  skip-message-patterns:
    description: 'Newline-separated bash glob patterns matched against the commit subject. If any matches, the commit is skipped.'
    required: false
    default: |
      Merge*
  skip-author-patterns:
    description: 'Newline-separated bash glob patterns matched against the commit author name. If any matches, the commit is skipped.'
    required: false
    default: ''

  min-severity-for-issue:
    description: 'Lowest severity that triggers issue creation. One of: critical, warning, info.'
    required: false
    default: 'warning'
  min-models-for-fix-pr:
    description: 'Number of providers that must agree on a high-confidence fix before a draft fix PR is opened. Set to 0 to disable fix PRs.'
    required: false
    default: '2'

  issue-label:
    description: 'Label applied to created issues. Created on demand.'
    required: false
    default: 'ai-review'
  issue-title-prefix:
    description: 'Prefix used in issue titles. The short SHA is appended.'
    required: false
    default: '[AI Review]'
  fix-pr-title-prefix:
    description: 'Prefix used in fix PR titles. The short SHA is appended.'
    required: false
    default: '[AI Fix] Suggested fixes for'
  fix-branch-prefix:
    description: 'Branch prefix for fix PRs. Short SHA is appended.'
    required: false
    default: 'ai-fix/'
  base-branch:
    description: 'Base branch fix PRs target.'
    required: false
    default: 'main'

  github-token:
    description: 'Token used to create issues, comments, branches, and PRs.'
    required: false
    default: ${{ github.token }}

  node-version:
    description: 'Node.js version used to run the review script.'
    required: false
    default: '20'

outputs:
  reviewed:
    description: 'true if the commit was reviewed, false if skipped.'
    value: ${{ steps.review.outputs.reviewed }}
  skip-reason:
    description: 'Reason the commit was skipped, if any.'
    value: ${{ steps.check.outputs.skip_reason }}
  diff-line-count:
    description: 'Added/changed line count of the filtered diff.'
    value: ${{ steps.diff.outputs.line_count }}
  critical-count:
    description: 'Number of critical findings after dedup.'
    value: ${{ steps.digest.outputs.critical_count }}
  warning-count:
    description: 'Number of warning findings after dedup.'
    value: ${{ steps.digest.outputs.warning_count }}
  info-count:
    description: 'Number of info findings after dedup.'
    value: ${{ steps.digest.outputs.info_count }}
  issue-url:
    description: 'URL of the created issue, if any.'
    value: ${{ steps.digest.outputs.issue_url }}
  fix-pr-url:
    description: 'URL of the created draft fix PR, if any.'
    value: ${{ steps.digest.outputs.fix_pr_url }}
  provider-failures:
    description: 'Comma-separated provider names that failed to produce a valid review.'
    value: ${{ steps.review.outputs.provider_failures }}
  provider-successes:
    description: 'Comma-separated provider names that produced a valid review.'
    value: ${{ steps.review.outputs.provider_successes }}
  provider-skips:
    description: 'Comma-separated provider names skipped because credentials or supported auth modes were not provided.'
    value: ${{ steps.review.outputs.provider_skips }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Check if review should run
      id: check
      shell: bash
      env:
        COMMIT_SHA: ${{ inputs.commit-sha }}
        SKIP_MESSAGE_PATTERNS: ${{ inputs.skip-message-patterns }}
        SKIP_AUTHOR_PATTERNS: ${{ inputs.skip-author-patterns }}
      run: bash "${{ github.action_path }}/scripts/check-skip.sh"

    - name: Extract and filter diff
      if: steps.check.outputs.should_review == 'true'
      id: diff
      shell: bash
      env:
        COMMIT_SHA: ${{ inputs.commit-sha }}
        EXCLUDE_PATHS: ${{ inputs.exclude-paths }}
        MAX_DIFF_LINES: ${{ inputs.max-diff-lines }}
      run: bash "${{ github.action_path }}/scripts/extract-diff.sh"

    - name: Run providers
      id: review
      if: steps.check.outputs.should_review == 'true' && steps.diff.outputs.skip_large != 'true'
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
        COMMIT_SHA: ${{ inputs.commit-sha }}
        CLAUDE_AUTH: ${{ inputs.claude-auth }}
        OPENAI_AUTH: ${{ inputs.openai-auth }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude-code-oauth-token }}
        CODEX_ACCESS_TOKEN: ${{ inputs.codex-access-token }}
        CODEX_AUTH_JSON: ${{ inputs.codex-auth-json }}
        CODEX_HOME_INPUT: ${{ inputs.codex-home }}
        INSTALL_CLI_TOOLS: ${{ inputs.install-cli-tools }}
        CLAUDE_CLI_PATH: ${{ inputs.claude-cli-path }}
        CODEX_CLI_PATH: ${{ inputs.codex-cli-path }}
        CODEX_SANDBOX: ${{ inputs.codex-sandbox }}
        CLAUDE_MODEL: ${{ inputs.claude-model }}
        OPENAI_MODEL: ${{ inputs.openai-model }}
        GEMINI_MODEL: ${{ inputs.gemini-model }}
        CLAUDE_CONTEXT_FILE: ${{ inputs.claude-context-file }}
        OPENAI_CONTEXT_FILE: ${{ inputs.openai-context-file }}
        GEMINI_CONTEXT_FILE: ${{ inputs.gemini-context-file }}
        PROMPT_FILE: ${{ inputs.prompt-file }}
        SCRIPT_DIR: ${{ github.action_path }}/scripts
      run: bash "${{ github.action_path }}/scripts/run-providers.sh"

    - name: Create digest
      id: digest
      if: steps.check.outputs.should_review == 'true' && steps.diff.outputs.skip_large != 'true' && steps.review.outcome == 'success'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        COMMIT_SHA: ${{ inputs.commit-sha }}
        MIN_SEVERITY_FOR_ISSUE: ${{ inputs.min-severity-for-issue }}
        MIN_MODELS_FOR_FIX_PR: ${{ inputs.min-models-for-fix-pr }}
        ISSUE_LABEL: ${{ inputs.issue-label }}
        ISSUE_TITLE_PREFIX: ${{ inputs.issue-title-prefix }}
        FIX_PR_TITLE_PREFIX: ${{ inputs.fix-pr-title-prefix }}
        FIX_BRANCH_PREFIX: ${{ inputs.fix-branch-prefix }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        CLAUDE_MODEL: ${{ inputs.claude-model }}
        OPENAI_MODEL: ${{ inputs.openai-model }}
        GEMINI_MODEL: ${{ inputs.gemini-model }}
      run: bash "${{ github.action_path }}/scripts/ai-review-digest.sh"

    - name: Report review status
      if: always() && steps.check.outputs.should_review == 'true' && steps.diff.outputs.skip_large != 'true'
      shell: bash
      env:
        COMMIT_SHA: ${{ inputs.commit-sha }}
        REVIEW_OUTCOME: ${{ steps.review.outcome }}
        PROVIDER_SUCCESSES: ${{ steps.review.outputs.provider_successes }}
        PROVIDER_FAILURES: ${{ steps.review.outputs.provider_failures }}
        PROVIDER_SKIPS: ${{ steps.review.outputs.provider_skips }}
        CRITICAL_COUNT: ${{ steps.digest.outputs.critical_count }}
        WARNING_COUNT: ${{ steps.digest.outputs.warning_count }}
        INFO_COUNT: ${{ steps.digest.outputs.info_count }}
        ISSUE_URL: ${{ steps.digest.outputs.issue_url }}
        FIX_PR_URL: ${{ steps.digest.outputs.fix_pr_url }}
      run: |
        {
          echo "### AI commit review"
          echo ""
          echo "- Commit: \`${COMMIT_SHA}\`"
          echo "- Provider run: ${REVIEW_OUTCOME:-skipped}"
          echo "- Provider successes: ${PROVIDER_SUCCESSES:-none}"
          echo "- Provider failures: ${PROVIDER_FAILURES:-none}"
          echo "- Provider skips: ${PROVIDER_SKIPS:-none}"
          echo "- Findings: ${CRITICAL_COUNT:-0} critical, ${WARNING_COUNT:-0} warning, ${INFO_COUNT:-0} info"
          if [ -n "${ISSUE_URL}" ]; then
            echo "- Issue: ${ISSUE_URL}"
          else
            echo "- Issue: none"
          fi
          if [ -n "${FIX_PR_URL}" ]; then
            echo "- Fix PR: ${FIX_PR_URL}"
          fi
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Verify providers left checkout unchanged
      if: steps.check.outputs.should_review == 'true' && steps.diff.outputs.skip_large != 'true' && steps.review.outcome == 'success'
      shell: bash
      run: |
        git diff --exit-code
        git diff --cached --exit-code

        UNTRACKED=$(git ls-files --others --exclude-standard | grep -Ev '^(claude-findings|openai-findings|gemini-findings)/' || true)

        if [ -n "$UNTRACKED" ]; then
          echo "Unexpected untracked files left after AI review:"
          echo "$UNTRACKED"
          exit 1
        fi
